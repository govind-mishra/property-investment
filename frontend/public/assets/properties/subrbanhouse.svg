<?xml version="1.0" encoding="UTF-8"?>
<!-- Static SVG for Suburban House -->
<svg width="220" height="160" viewBox="0 0 220 160" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Suburban house illustration">
  <rect width="220" height="160" fill="#f9fafb" />
  <rect x="0" y="110" width="220" height="50" fill="#d1fae5" />

  <!-- House base -->
  <rect x="70" y="80" width="80" height="40" rx="4" fill="#fecaca" />
  <!-- Roof -->
  <polygon points="60,80 110,50 160,80" fill="#f97316" />

  <!-- Door -->
  <rect x="105" y="90" width="18" height="30" rx="3" fill="#111827" />
  <circle cx="118" cy="105" r="2" fill="#e5e7eb" />

  <!-- Windows -->
  <rect x="80" y="90" width="14" height="14" rx="2" fill="#bfdbfe" />
  <rect x="126" y="90" width="14" height="14" rx="2" fill="#bfdbfe" />

  <!-- Small tree -->
  <rect x="55" y="100" width="6" height="20" fill="#4b5563" />
  <circle cx="58" cy="95" r="10" fill="#22c55e" />
</svg>
