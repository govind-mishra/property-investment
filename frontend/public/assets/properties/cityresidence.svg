<?xml version="1.0" encoding="UTF-8"?>
<!-- Static SVG for City Residence -->
<svg width="220" height="160" viewBox="0 0 220 160" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="City residence illustration">
	<rect width="220" height="160" fill="#f3f4f6" />
	<rect x="0" y="120" width="220" height="40" fill="#e6eef6" />

	<!-- Building -->
	<rect x="60" y="40" width="100" height="80" rx="6" fill="#0f172a" />
	<!-- Windows -->
	<g fill="#60a5fa">
		<rect x="70" y="50" width="20" height="14" rx="2" />
		<rect x="106" y="50" width="20" height="14" rx="2" />
		<rect x="70" y="72" width="20" height="14" rx="2" />
		<rect x="106" y="72" width="20" height="14" rx="2" />
		<rect x="70" y="94" width="20" height="14" rx="2" />
		<rect x="106" y="94" width="20" height="14" rx="2" />
	</g>

	<!-- Entrance -->
	<rect x="98" y="100" width="24" height="20" rx="3" fill="#111827" />
</svg>
